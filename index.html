<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensinoclick — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="toast-container"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-mark">E</div>
                <div>
                    <div class="login-title">Ensinoclick</div>
                    <div class="login-subtitle">Plataforma Educacional</div>
                </div>
            </div>

            <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email</label>
                    <input
                        type="email"
                        id="login-email"
                        class="input"
                        placeholder="seu@email.com"
                        autocomplete="email"
                        required
                    />
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Senha</label>
                    <div style="position:relative">
                        <input
                            type="password"
                            id="login-password"
                            class="input"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                            style="padding-right: 40px"
                        />
                        <button type="button"
                            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-3);font-size:0.875rem"
                            onclick="togglePassword()">
                            👁
                        </button>
                    </div>
                </div>

                <div id="login-error" class="info-box" style="display:none;background:var(--color-red-bg);border-color:#fecaca;color:var(--color-red)"></div>

                <button type="submit" class="btn btn-primary" id="btn-login" style="width:100%;padding:12px">
                    Entrar
                </button>

                <p class="login-divider">Plataforma para uso institucional</p>
            </form>
        </div>
    </div>

    <!-- Supabase SDK (UMD bundle — necessário para window.supabase funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>

    <script>
        // Verificar se já está logado
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'app.html';
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');
            const errBox = document.getElementById('login-error');

            errBox.style.display = 'none';

            if (!email || !password) {
                errBox.textContent = 'Preencha email e senha';
                errBox.style.display = 'block';
                return;
            }

            btn.textContent = 'Entrando...';
            btn.disabled = true;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) throw error;

                // Verificar se há perfil na tabela usuarios
                const { data: profile, error: profError } = await supabase
                    .from('usuarios')
                    .select('id,ativo')
                    .eq('auth_id', data.user.id)
                    .single();

                if (profError || !profile) {
                    await supabase.auth.signOut();
                    throw new Error('Perfil não encontrado. Contate o administrador.');
                }

                if (!profile.ativo) {
                    await supabase.auth.signOut();
                    throw new Error('Conta desativada. Contate o administrador.');
                }

                window.location.href = 'app.html';

            } catch (err) {
                const msg = err.message.includes('Invalid login credentials')
                    ? 'Email ou senha incorretos'
                    : err.message;
                errBox.textContent = msg;
                errBox.style.display = 'block';
            } finally {
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        }

        function togglePassword() {
            const input = document.getElementById('login-password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
