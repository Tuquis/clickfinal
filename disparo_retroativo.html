<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Disparo Retroativo — Emails de Agendamento</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { font-size: 1.4rem; color: #1a1a2e; }
    .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 20px; }
    .btn { background: #4f46e5; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-danger { background: #dc2626; }
    #log { font-family: monospace; font-size: .8rem; background: #111; color: #a3e635; padding: 16px; border-radius: 8px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; min-height: 60px; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .info { color: #93c5fd; }
    .warn { color: #fbbf24; }
    .summary { font-size: .95rem; color: #374151; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 600; }
    .badge-green { background:#d1fae5; color:#065f46; }
    .badge-red   { background:#fee2e2; color:#991b1b; }
    .badge-blue  { background:#dbeafe; color:#1e40af; }
  </style>
</head>
<body>
  <h1>Disparo Retroativo — Emails de Agendamento da Semana</h1>

  <div class="card">
    <p class="summary">
      Esta ferramenta busca todas as aulas com status <strong>agendada</strong> da semana atual
      e envia o email de confirmação de agendamento para o professor de cada uma.<br>
      <strong>Semana:</strong> <span id="span-semana">calculando…</span>
    </p>
    <br>
    <button class="btn" id="btn-buscar" onclick="buscarAulas()">1. Buscar aulas da semana</button>
  </div>

  <div class="card" id="card-resultado" style="display:none;">
    <div id="resultado-lista"></div>
    <br>
    <button class="btn" id="btn-disparar" onclick="dispararEmails()">2. Disparar emails para todas</button>
  </div>

  <div class="card">
    <strong>Log de execução:</strong>
    <div id="log">Aguardando…</div>
  </div>

<script>
// ── Config ─────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://kverxbbwvmxcdiqwcijp.supabase.co';
// Usa service role para bypassar RLS e conseguir ler o email dos professores
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2ZXJ4YmJ3dm14Y2RpcXdjaWpwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzYzNjEzNSwiZXhwIjoyMDkzMjEyMTM1fQ.8oqv5SwRA7aQspqRT0xK5KsRYwVcj1jJPbX_WD6GoPA';
const EMAILJS_PUBLIC_KEY = 'jclQiDLL5puzfQEFr';
const EMAILJS_SERVICE_ID = 'service_c6lui2h';
const EMAILJS_TEMPLATE   = 'template_du9xhya';   // confirmação de agendamento

const DIAS  = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
emailjs.init(EMAILJS_PUBLIC_KEY);

// ── Helpers de semana ───────────────────────────────────────────
function semanaAtual() {
  const hoje = new Date();
  const dia  = hoje.getDay();
  const diff = dia === 0 ? -6 : 1 - dia;
  const seg  = new Date(hoje);
  seg.setDate(hoje.getDate() + diff);
  seg.setHours(0, 0, 0, 0);
  const dom = new Date(seg);
  dom.setDate(seg.getDate() + 6);

  const iso = d => d.toISOString().split('T')[0];
  const fmt = d => d.toLocaleDateString('pt-BR', { day:'numeric', month:'long' });
  return { inicio: iso(seg), fim: iso(dom), label: `${fmt(seg)} – ${fmt(dom)}` };
}

function log(msg, cls = '') {
  const el = document.getElementById('log');
  const ts  = new Date().toLocaleTimeString('pt-BR');
  el.innerHTML += `<span class="${cls}">[${ts}] ${msg}</span>\n`;
  el.scrollTop  = el.scrollHeight;
}

// ── Passo 1: buscar aulas ───────────────────────────────────────
let aulasEncontradas = [];

async function buscarAulas() {
  document.getElementById('btn-buscar').disabled = true;
  document.getElementById('log').innerHTML = '';
  aulasEncontradas = [];

  const sem = semanaAtual();
  document.getElementById('span-semana').textContent = sem.label;
  log(`Buscando aulas de ${sem.inicio} até ${sem.fim}…`, 'info');

  const { data, error } = await db
    .from('v_agenda_completa')
    .select('*')
    .eq('status', 'agendada')
    .gte('data', sem.inicio)
    .lte('data', sem.fim)
    .order('data', { ascending: true })
    .order('horario', { ascending: true });

  if (error) {
    log(`ERRO ao buscar: ${error.message}`, 'err');
    document.getElementById('btn-buscar').disabled = false;
    return;
  }

  aulasEncontradas = data || [];
  log(`${aulasEncontradas.length} aula(s) encontrada(s).`, aulasEncontradas.length ? 'ok' : 'warn');

  // monta tabela de prévia
  const card = document.getElementById('card-resultado');
  const lista = document.getElementById('resultado-lista');

  if (aulasEncontradas.length === 0) {
    lista.innerHTML = '<p>Nenhuma aula agendada encontrada nesta semana.</p>';
    card.style.display = 'block';
    document.getElementById('btn-disparar').style.display = 'none';
    document.getElementById('btn-buscar').disabled = false;
    return;
  }

  let html = `<p>Serão enviados <strong>${aulasEncontradas.length}</strong> email(s):</p>
  <table style="width:100%;border-collapse:collapse;font-size:.85rem;">
    <thead>
      <tr style="background:#f3f4f6;text-align:left;">
        <th style="padding:8px;">Data</th>
        <th style="padding:8px;">Horário</th>
        <th style="padding:8px;">Aluno</th>
        <th style="padding:8px;">Professor</th>
        <th style="padding:8px;">Disciplina</th>
      </tr>
    </thead>
    <tbody>`;

  aulasEncontradas.forEach(a => {
    html += `<tr style="border-bottom:1px solid #e5e7eb;">
      <td style="padding:8px;">${a.data}</td>
      <td style="padding:8px;">${(a.horario||'').substring(0,5)}</td>
      <td style="padding:8px;">${a.aluno_nome || '—'}</td>
      <td style="padding:8px;">${a.professor_nome || '—'}</td>
      <td style="padding:8px;">${a.disciplina || '—'}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  lista.innerHTML = html;
  card.style.display = 'block';
  document.getElementById('btn-buscar').disabled = false;
}

// ── Passo 2: disparar emails ────────────────────────────────────
async function dispararEmails() {
  if (aulasEncontradas.length === 0) return;

  document.getElementById('btn-disparar').disabled = true;
  log('─── Iniciando disparo de emails ───', 'info');

  let enviados = 0;
  let erros    = 0;

  for (const aula of aulasEncontradas) {
    try {
      // Busca email do professor
      const { data: prof, error: profErr } = await db
        .from('usuarios')
        .select('email, nome')
        .eq('id', aula.professor_id)
        .single();

      if (profErr || !prof?.email) {
        log(`[SKIP] Aula ${aula.id} — professor sem email`, 'warn');
        continue;
      }

      // Formata data por extenso
      const dataObj      = new Date(aula.data + 'T00:00:00');
      const dataFormatada = `${DIAS[dataObj.getDay()]}, ${dataObj.getDate()} de ${MESES[dataObj.getMonth()]} de ${dataObj.getFullYear()}`;

      const params = {
        to_email:       prof.email,
        to_name:        prof.nome,
        professor_nome: aula.professor_nome  || prof.nome,
        aluno_nome:     aula.aluno_nome      || '',
        disciplina:     aula.disciplina      || '',
        serie:          aula.serie           || '',
        data_aula:      dataFormatada,
        horario:        (aula.horario || '').substring(0, 5),
        conteudo:       aula.conteudo        || '',
        link_meet:      aula.link_meet       || 'Não informado ainda',
      };

      const resp = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE, params);
      log(`✓ Enviado → ${prof.email} | ${aula.aluno_nome} | ${aula.data} ${params.horario} | status:${resp.status}`, 'ok');
      enviados++;

      // Pequena pausa para não sobrecarregar a API do EmailJS
      await new Promise(r => setTimeout(r, 400));

    } catch (e) {
      log(`✗ ERRO — aula ${aula.id}: ${e?.text || e?.message || JSON.stringify(e)}`, 'err');
      erros++;
    }
  }

  log('─────────────────────────────────────', 'info');
  log(`Concluído. Enviados: ${enviados} | Erros: ${erros}`, enviados > 0 ? 'ok' : 'warn');
  document.getElementById('btn-disparar').disabled = false;
}
</script>
</body>
</html>
